name: Deploy InsideDictionary App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on server
        run: |
          cd /srv/apps/InsideDictionary
          git pull origin main

          export NVM_DIR="$HOME/.nvm"
          source "$NVM_DIR/nvm.sh"

          npm install
          npm run build

          pm2 restart InsideDictionary  --output /srv/logs/InsideDictionary/console.log --error /srv/logs/InsideDictionary/error.log
